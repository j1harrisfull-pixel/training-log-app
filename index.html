<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2638E0">
<meta name="description" content="A personal offline strength and mobility training log.">
<title>Training Log</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap">

<style>
/* ============================================================
   Training Log — engineering-blueprint aesthetic, cobalt #2638E0
   Light + dark via prefers-color-scheme, manual override on <html>.
   WCAG AA verified for text + interactive colour pairs in both.
   ============================================================ */

/* ---- Design tokens: LIGHT (default) ---- */
:root {
  --bg: #EDECE4;
  --grid: rgba(20,22,30,.045);
  --surface: #FBFAF6;
  --surface-2: #FFFFFF;
  --ink: #14161D;            /* on surface: ~15:1 */
  --ink-dim: #565C6C;        /* on surface: ~5.5:1 */
  --line: rgba(20,22,30,.13);
  --line-strong: rgba(20,22,30,.24);
  --accent: #2638E0;         /* cobalt fill; white-on-this = 7.8:1 */
  --accent-ink: #2032C2;     /* cobalt text on light surface = ~8:1 */
  --on-accent: #FFFFFF;
  --mob: #0C6E5A;            /* mobility accent, on surface = ~5:1 */
  --danger: #B42318;
  --shadow: 0 1px 0 rgba(20,22,30,.03), 0 14px 30px -22px rgba(20,22,30,.45);
  --radius: 16px;
  --tap: 48px;
  color-scheme: light;
}

/* ---- Design tokens: DARK ---- */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0B0D12;
    --grid: rgba(255,255,255,.04);
    --surface: #14171F;
    --surface-2: #1B1F2A;
    --ink: #ECEEF4;          /* on surface: ~14:1 */
    --ink-dim: #9CA4B6;      /* on surface: ~6:1 */
    --line: rgba(255,255,255,.10);
    --line-strong: rgba(255,255,255,.20);
    --accent: #2638E0;
    --accent-ink: #A6B2FF;   /* light cobalt text on dark = ~8:1 */
    --on-accent: #FFFFFF;
    --mob: #4FD6B6;          /* on dark surface = ~9:1 */
    --danger: #FF8A7A;
    --shadow: 0 1px 0 rgba(0,0,0,.5), 0 18px 36px -22px rgba(0,0,0,.8);
    color-scheme: dark;
  }
}

/* ---- Manual theme override (beats the media query) ---- */
:root[data-theme="light"] {
  --bg: #EDECE4; --grid: rgba(20,22,30,.045); --surface: #FBFAF6; --surface-2: #FFFFFF;
  --ink: #14161D; --ink-dim: #565C6C; --line: rgba(20,22,30,.13); --line-strong: rgba(20,22,30,.24);
  --accent: #2638E0; --accent-ink: #2032C2; --on-accent: #FFFFFF; --mob: #0C6E5A; --danger: #B42318;
  --shadow: 0 1px 0 rgba(20,22,30,.03), 0 14px 30px -22px rgba(20,22,30,.45); color-scheme: light;
}
:root[data-theme="dark"] {
  --bg: #0B0D12; --grid: rgba(255,255,255,.04); --surface: #14171F; --surface-2: #1B1F2A;
  --ink: #ECEEF4; --ink-dim: #9CA4B6; --line: rgba(255,255,255,.10); --line-strong: rgba(255,255,255,.20);
  --accent: #2638E0; --accent-ink: #A6B2FF; --on-accent: #FFFFFF; --mob: #4FD6B6; --danger: #FF8A7A;
  --shadow: 0 1px 0 rgba(0,0,0,.5), 0 18px 36px -22px rgba(0,0,0,.8); color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  font-family: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.45;
  min-height: 100svh;
  overscroll-behavior-y: none;
}
/* Blueprint grid wash */
body::before {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 28px 28px;
  -webkit-mask-image: linear-gradient(180deg, #000, #000 40%, transparent);
          mask-image: linear-gradient(180deg, #000, #000 40%, transparent);
}
.app { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; }

button { font: inherit; color: inherit; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }
:focus-visible { outline: 2.5px solid var(--accent-ink); outline-offset: 2px; border-radius: 6px; }

.mono { font-family: "Spline Sans Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }

/* ---------- Top bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: calc(env(safe-area-inset-top) + 12px) 18px 12px;
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  -webkit-backdrop-filter: saturate(1.4) blur(12px);
          backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--line);
}
.brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
.brand__mark { width: 34px; height: 17px; color: var(--accent-ink); flex: none; }
.brand__name {
  font-family: "Archivo", sans-serif; font-weight: 800; font-size: 15px;
  letter-spacing: .16em; text-transform: uppercase; white-space: nowrap;
}
.icon-btn {
  width: var(--tap); height: var(--tap); flex: none;
  display: grid; place-items: center;
  background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px;
  transition: transform .12s ease, border-color .12s ease, background .12s ease;
}
.icon-btn:hover { border-color: var(--line-strong); }
.icon-btn:active { transform: scale(.94); }
.icon-btn svg { width: 22px; height: 22px; }

/* ---------- Tabs ---------- */
.tabs {
  position: sticky; z-index: 19;
  top: calc(env(safe-area-inset-top) + 60px);
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 2px; padding: 10px 14px 0; background: var(--bg);
}
.tab {
  position: relative; background: none; border: 0;
  padding: 12px 6px 14px; text-align: center; border-radius: 12px 12px 0 0;
  color: var(--ink-dim); transition: color .18s ease;
}
.tab__letter {
  display: block; font-family: "Archivo", sans-serif; font-weight: 800;
  font-size: 22px; letter-spacing: .02em; line-height: 1;
}
.tab__name { display: block; font-size: 11px; letter-spacing: .09em; text-transform: uppercase; margin-top: 4px; font-weight: 600; }
.tab[aria-selected="true"] { color: var(--ink); }
.tab__ink { position: absolute; left: 14px; right: 14px; bottom: -1px; height: 3px; background: var(--accent); border-radius: 3px; transform: scaleX(0); transition: transform .26s cubic-bezier(.2,.8,.2,1); }
.tab[aria-selected="true"] .tab__ink { transform: scaleX(1); }
.tabs__rule { height: 1px; background: var(--line); margin: 0 14px; }

/* ---------- Session head ---------- */
.session {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 14px;
  padding: 18px 18px 6px;
}
.session__focus { font-family: "Archivo", sans-serif; font-weight: 700; font-size: 24px; letter-spacing: -.01em; line-height: 1.05; margin: 0; }
.session__meta { font-size: 12px; color: var(--ink-dim); margin-top: 5px; letter-spacing: .02em; }
.reset-btn {
  flex: none; display: inline-flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--line-strong); border-radius: 999px;
  padding: 9px 14px; font-size: 12px; font-weight: 600; letter-spacing: .03em; color: var(--ink);
  transition: border-color .12s ease, transform .12s ease;
}
.reset-btn:hover { border-color: var(--accent-ink); color: var(--accent-ink); }
.reset-btn:active { transform: scale(.96); }

/* ---------- Exercise list ---------- */
.list { padding: 8px 14px calc(env(safe-area-inset-bottom) + 28px); display: flex; flex-direction: column; gap: 12px; }

.card {
  position: relative; background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 16px 16px 14px; box-shadow: var(--shadow);
  transition: border-color .25s ease;
}
.card.is-complete { border-color: color-mix(in srgb, var(--accent) 55%, var(--line)); }
.card.is-complete::after {
  content: "DONE"; position: absolute; top: 14px; right: 16px;
  font-family: "Spline Sans Mono", monospace; font-size: 10px; font-weight: 600;
  letter-spacing: .18em; color: var(--accent-ink);
}
.list.reveal .card { opacity: 0; animation: rise .5s cubic-bezier(.2,.8,.2,1) forwards; animation-delay: calc(var(--i) * 55ms); }
@keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

.card__head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-right: 44px; }
.card__name { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
.tag {
  flex: none; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 999px; border: 1px solid currentColor;
}
.tag--strength { color: var(--accent-ink); }
.tag--mobility { color: var(--mob); }

.card__row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }

.weight { display: flex; align-items: center; gap: 8px; }
.step {
  width: 40px; height: 40px; flex: none; display: grid; place-items: center;
  font-family: "Spline Sans Mono", monospace; font-size: 22px; line-height: 1;
  background: var(--surface-2); border: 1px solid var(--line-strong); border-radius: 11px;
  color: var(--ink); transition: transform .1s ease, border-color .12s ease;
}
.step:hover { border-color: var(--accent-ink); }
.step:active { transform: scale(.9); }
.weight__field { display: inline-flex; align-items: baseline; gap: 4px; min-width: 78px; justify-content: center; }
.weight__input {
  width: 58px; text-align: right; background: none; border: 0; padding: 0;
  font-family: "Spline Sans Mono", monospace; font-variant-numeric: tabular-nums;
  font-size: 26px; font-weight: 600; letter-spacing: -.02em;
  -moz-appearance: textfield;
}
.weight__input::-webkit-outer-spin-button, .weight__input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.weight__unit { font-size: 12px; color: var(--ink-dim); font-weight: 600; letter-spacing: .04em; }
.weight-note { font-size: 12px; color: var(--ink-dim); font-style: italic; }

.setcount { display: flex; align-items: baseline; gap: 3px; font-family: "Spline Sans Mono", monospace; font-variant-numeric: tabular-nums; }
.setcount__done { font-size: 22px; font-weight: 600; color: var(--accent-ink); }
.setcount__sep, .setcount__total { font-size: 16px; color: var(--ink-dim); }
.setcount__label { font-family: "Hanken Grotesk", sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-dim); margin-left: 4px; align-self: center; }

.pills { display: flex; flex-wrap: wrap; gap: 8px; }
.pill {
  min-width: 56px; min-height: var(--tap); padding: 6px 12px;
  display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
  background: var(--surface-2); border: 1px solid var(--line-strong); border-radius: 13px;
  font-family: "Spline Sans Mono", monospace; transition: transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease;
}
.pill__reps { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; }
.pill__lbl { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-dim); }
.pill:hover { border-color: var(--accent-ink); }
.pill.is-done { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
.pill.is-done .pill__lbl { color: color-mix(in srgb, var(--on-accent) 80%, transparent); }
.pill.is-done .pill__reps::before { content: "✓ "; }
.pill.pulse { animation: pulse .3s ease; }
@keyframes pulse { 0% { transform: scale(1); } 40% { transform: scale(1.12); } 100% { transform: scale(1); } }

/* ---------- Notes / scheme ---------- */
.notes-toggle {
  margin-top: 14px; display: inline-flex; align-items: center; gap: 8px;
  background: none; border: 0; padding: 6px 2px; color: var(--ink-dim);
  font-size: 13px; font-weight: 600; letter-spacing: .02em;
}
.notes-toggle .chev { display: inline-block; transition: transform .22s ease; font-size: 11px; }
.notes-toggle[aria-expanded="true"] { color: var(--ink); }
.notes-toggle[aria-expanded="true"] .chev { transform: rotate(90deg); }
.notes-toggle .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; }

.notes { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .28s cubic-bezier(.2,.8,.2,1); }
.notes.is-open { grid-template-rows: 1fr; }
.notes__inner { overflow: hidden; min-height: 0; }
.notes__pad { padding-top: 12px; }
.field-label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-dim); font-weight: 700; margin-bottom: 6px; }
.notes__text, .reps__input {
  width: 100%; background: var(--surface-2); border: 1px solid var(--line); border-radius: 11px;
  padding: 11px 12px; resize: vertical; line-height: 1.5;
}
.notes__text { min-height: 70px; }
.notes__text:focus, .reps__input:focus { border-color: var(--accent-ink); outline: none; }
.scheme { display: flex; gap: 18px; align-items: flex-end; margin-top: 14px; flex-wrap: wrap; }
.scheme__item { display: flex; flex-direction: column; }
.stepper { display: inline-flex; align-items: center; gap: 10px; }
.stepper__val { min-width: 22px; text-align: center; font-family: "Spline Sans Mono", monospace; font-size: 20px; font-weight: 600; }
.reps__input { width: 130px; resize: none; }

/* ---------- Settings sheet ---------- */
dialog.sheet {
  width: 100%; max-width: 560px; margin: auto auto 0; padding: 0;
  border: 0; border-radius: 22px 22px 0 0; background: var(--surface); color: var(--ink);
  box-shadow: 0 -10px 50px -12px rgba(0,0,0,.5);
}
dialog.sheet::backdrop { background: rgba(8,9,13,.55); -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
dialog.sheet[open] { animation: sheetUp .3s cubic-bezier(.2,.8,.2,1); }
@keyframes sheetUp { from { transform: translateY(24px); opacity: 0; } to { transform: none; opacity: 1; } }
.sheet__grip { width: 38px; height: 4px; border-radius: 4px; background: var(--line-strong); margin: 10px auto 2px; }
.sheet__body { padding: 8px 20px calc(env(safe-area-inset-bottom) + 22px); }
.sheet h2 { font-family: "Archivo", sans-serif; font-weight: 700; font-size: 20px; margin: 8px 0 18px; letter-spacing: -.01em; }
.sect { margin-bottom: 22px; }
.sect__label { font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: var(--ink-dim); font-weight: 700; margin-bottom: 10px; }
.seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 12px; padding: 3px; gap: 3px; }
.seg button { border: 0; background: none; padding: 9px 16px; border-radius: 9px; font-size: 13px; font-weight: 600; color: var(--ink-dim); transition: background .15s ease, color .15s ease; }
.seg button[aria-pressed="true"] { background: var(--accent); color: var(--on-accent); }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  flex: 1 1 auto; min-height: var(--tap); display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--surface-2); border: 1px solid var(--line-strong); border-radius: 12px;
  padding: 0 16px; font-weight: 600; font-size: 14px; transition: transform .1s ease, border-color .12s ease;
}
.btn:hover { border-color: var(--accent-ink); }
.btn:active { transform: scale(.97); }
.btn--primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
.btn--danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 45%, var(--line-strong)); }
.status { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--ink-dim); }
.status__dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ink-dim); flex: none; }
.status__dot.ok { background: var(--mob); }
.sheet__about { font-size: 12px; color: var(--ink-dim); text-align: center; margin-top: 6px; letter-spacing: .02em; }
.sheet__close { width: 100%; margin-top: 4px; }

/* ---------- Toast ---------- */
.toast {
  position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 22px); transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--bg); padding: 11px 18px; border-radius: 999px;
  font-size: 13px; font-weight: 600; letter-spacing: .01em; box-shadow: var(--shadow);
  opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease; z-index: 60; max-width: 90%;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <svg class="brand__mark" viewBox="0 0 48 24" aria-hidden="true"><g fill="currentColor">
        <rect x="18" y="10.5" width="12" height="3" rx="1.5"/>
        <rect x="11.5" y="5.5" width="4.6" height="13" rx="2.2"/>
        <rect x="31.9" y="5.5" width="4.6" height="13" rx="2.2"/>
        <rect x="6.5" y="8.3" width="3.6" height="7.4" rx="1.8"/>
        <rect x="37.9" y="8.3" width="3.6" height="7.4" rx="1.8"/>
      </g></svg>
      <span class="brand__name">Training Log</span>
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings and backup" aria-haspopup="dialog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <nav class="tabs" id="tabs" role="tablist" aria-label="Training sessions"></nav>
  <div class="tabs__rule"></div>

  <main>
    <div class="session" id="sessionHead"></div>
    <div class="list reveal" id="list"></div>
  </main>
</div>

<dialog class="sheet" id="sheet" aria-label="Settings">
  <div class="sheet__grip"></div>
  <div class="sheet__body">
    <h2>Settings &amp; backup</h2>

    <div class="sect">
      <div class="sect__label">Appearance</div>
      <div class="seg" id="themeSeg" role="group" aria-label="Theme">
        <button data-theme-val="system" type="button">System</button>
        <button data-theme-val="light" type="button">Light</button>
        <button data-theme-val="dark" type="button">Dark</button>
      </div>
    </div>

    <div class="sect">
      <div class="sect__label">Weight unit</div>
      <div class="seg" id="unitSeg" role="group" aria-label="Weight unit">
        <button data-unit-val="kg" type="button">kg</button>
        <button data-unit-val="lb" type="button">lb</button>
      </div>
    </div>

    <div class="sect">
      <div class="sect__label">Backup</div>
      <div class="btn-row">
        <button class="btn btn--primary" id="exportBtn" type="button">Export backup</button>
        <button class="btn" id="importBtn" type="button">Import backup</button>
        <input type="file" id="importFile" accept="application/json,.json" hidden>
      </div>
    </div>

    <div class="sect">
      <div class="sect__label">Offline storage</div>
      <div class="status" id="storageStatus"><span class="status__dot"></span><span>Checking…</span></div>
    </div>

    <div class="sect">
      <div class="sect__label">Maintenance</div>
      <div class="btn-row">
        <button class="btn btn--danger" id="eraseBtn" type="button">Erase all data</button>
      </div>
    </div>

    <button class="btn sheet__close" id="closeSheet" type="button">Done</button>
    <p class="sheet__about">Training Log · v1 · works fully offline</p>
  </div>
</dialog>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<noscript><p style="padding:24px;font-family:sans-serif">This app needs JavaScript enabled.</p></noscript>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "training-log:v1";
  var STEP = 2.5;          // weight increment
  var SETS_MIN = 1, SETS_MAX = 12;

  // ---------- helpers ----------
  function uid() { return "x" + Math.random().toString(36).slice(2, 8); }
  function clampInt(v, lo, hi, dflt) { v = parseInt(v, 10); if (isNaN(v)) v = dflt; return Math.max(lo, Math.min(hi, v)); }
  function numOr(v, d) { v = parseFloat(v); return isNaN(v) ? d : v; }
  function roundW(n) { return Math.round(n * 100) / 100; }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function fmtDate(iso) { try { return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric" }); } catch (e) { return "—"; } }

  // ---------- seed ----------
  function ex(id, name, type, weight, sets, reps, notes) {
    var done = []; for (var i = 0; i < sets; i++) done.push(false);
    return { id: id, name: name, type: type, weight: weight, sets: sets, reps: reps, notes: notes, notesOpen: false, done: done };
  }
  function seed() {
    return {
      version: 1, unit: "kg", activeSession: "A", theme: "system",
      lastReset: { A: null, B: null, C: null },
      sessions: {
        A: { letter: "A", name: "Lower", focus: "Squat · hinge · hips", exercises: [
          ex("a1", "Back Squat", "strength", 60, 3, "5", "Brace before the descent. Knees track over toes, drive the floor away."),
          ex("a2", "Bulgarian Split Squat", "strength", 20, 3, "8", "Tall torso, control the lowering. Rear foot relaxed."),
          ex("a3", "Goblet Squat", "strength", 24, 3, "10", "Elbows inside knees at the bottom, ribs down."),
          ex("a4", "90/90 Hip Switch", "mobility", 0, 2, "8/side", "Slow rotations, stay upright. Own the end range."),
          ex("a5", "Ankle Dorsiflexion Rock", "mobility", 0, 2, "10/side", "Knee past toes, heel glued down.")
        ] },
        B: { letter: "B", name: "Upper", focus: "Press · pull · carry", exercises: [
          ex("b1", "Bench Press", "strength", 50, 3, "5", "Shoulder blades pinned, controlled touch, full lockout."),
          ex("b2", "Overhead Press", "strength", 30, 3, "6", "Glutes tight, bar over mid-foot, no layback."),
          ex("b3", "Chest-Supported Row", "strength", 22, 3, "10", "Pull to the lower ribs, pause, slow return."),
          ex("b4", "Thoracic Extension", "mobility", 0, 2, "8", "Roller under upper back, ribs down, breathe into it."),
          ex("b5", "Band Pull-Apart", "mobility", 0, 2, "15", "Straight arms, squeeze the blades, no shrug.")
        ] },
        C: { letter: "C", name: "Posterior", focus: "Deadlift · hinge · back", exercises: [
          ex("c1", "Deadlift", "strength", 90, 3, "3", "Take the slack out, push the floor, hips and bar rise together."),
          ex("c2", "Romanian Deadlift", "strength", 60, 3, "8", "Soft knees, push hips back, feel the hamstrings load."),
          ex("c3", "Pull-Up", "strength", 0, 3, "6", "Full hang to chin over bar. Add load when reps come easy."),
          ex("c4", "Couch Stretch", "mobility", 0, 2, "45s/side", "Hips square, ribs down, breathe and soften."),
          ex("c5", "Cat–Cow", "mobility", 0, 2, "8", "Move one segment at a time, sync with breath.")
        ] }
      }
    };
  }

  // ---------- state ----------
  function normalizeEx(e) {
    var sets = clampInt(e && e.sets, SETS_MIN, SETS_MAX, 3);
    var done = (e && Array.isArray(e.done)) ? e.done.slice(0, sets).map(Boolean) : [];
    while (done.length < sets) done.push(false);
    return {
      id: (e && e.id) || uid(),
      name: String((e && e.name) || "Exercise"),
      type: (e && e.type === "mobility") ? "mobility" : "strength",
      weight: roundW(numOr(e && e.weight, 0)),
      sets: sets, reps: String((e && e.reps != null) ? e.reps : ""),
      notes: String((e && e.notes) || ""),
      notesOpen: !!(e && e.notesOpen), done: done
    };
  }
  function migrate(d) {
    if (!d || typeof d !== "object" || !d.sessions) return seed();
    var base = seed(), out = { version: 1, sessions: {} };
    ["A", "B", "C"].forEach(function (k) {
      var s = (d.sessions && d.sessions[k]) || base.sessions[k];
      out.sessions[k] = {
        letter: k,
        name: String((s && s.name) || base.sessions[k].name),
        focus: String((s && s.focus) || base.sessions[k].focus),
        exercises: ((s && s.exercises) || []).map(normalizeEx)
      };
      if (!out.sessions[k].exercises.length) out.sessions[k].exercises = base.sessions[k].exercises;
    });
    out.unit = d.unit === "lb" ? "lb" : "kg";
    out.theme = ["light", "dark", "system"].indexOf(d.theme) >= 0 ? d.theme : "system";
    out.activeSession = ["A", "B", "C"].indexOf(d.activeSession) >= 0 ? d.activeSession : "A";
    out.lastReset = (d.lastReset && typeof d.lastReset === "object") ? d.lastReset : { A: null, B: null, C: null };
    return out;
  }
  function load() {
    try { var raw = localStorage.getItem(STORAGE_KEY); if (raw) return migrate(JSON.parse(raw)); } catch (e) {}
    return seed();
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch (e) { toast("Couldn't save — storage may be full"); }
  }

  var state = load();

  // ---------- element refs ----------
  var $ = function (id) { return document.getElementById(id); };
  var tabsEl = $("tabs"), listEl = $("list"), headEl = $("sessionHead");
  var sheet = $("sheet"), toastEl = $("toast");

  function curSession() { return state.sessions[state.activeSession]; }
  function findEx(id) { return curSession().exercises.filter(function (e) { return e.id === id; })[0]; }

  // ---------- render: tabs ----------
  function renderTabs() {
    tabsEl.innerHTML = ["A", "B", "C"].map(function (k) {
      var s = state.sessions[k], sel = k === state.activeSession;
      return '<button class="tab" role="tab" data-tab="' + k + '" aria-selected="' + sel + '" tabindex="' + (sel ? "0" : "-1") + '">' +
        '<span class="tab__letter">' + k + '</span>' +
        '<span class="tab__name">' + esc(s.name) + '</span>' +
        '<span class="tab__ink" aria-hidden="true"></span></button>';
    }).join("");
  }

  // ---------- render: session head ----------
  function renderHead() {
    var s = curSession(), last = state.lastReset[state.activeSession];
    headEl.innerHTML =
      '<div><h1 class="session__focus">' + esc(s.focus) + '</h1>' +
      '<div class="session__meta">Session ' + state.activeSession + ' · ' + s.exercises.length + ' exercises · last reset ' + (last ? fmtDate(last) : "—") + '</div></div>' +
      '<button class="reset-btn" id="resetBtn" type="button" aria-label="Reset all sets for this session">' +
      '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg> Reset sets</button>';
    $("resetBtn").addEventListener("click", resetDay);
  }

  // ---------- render: a single card ----------
  function buildCard(e, i) {
    var total = e.sets, doneCount = e.done.slice(0, total).filter(Boolean).length;
    var complete = total > 0 && doneCount === total;

    var pills = "";
    for (var k = 0; k < total; k++) {
      var d = !!e.done[k];
      pills += '<button type="button" class="pill' + (d ? " is-done" : "") + '" data-act="set" data-ex="' + e.id + '" data-set="' + k +
        '" aria-pressed="' + d + '" aria-label="Set ' + (k + 1) + ' of ' + total + (d ? ", done" : "") + '">' +
        '<span class="pill__reps">' + esc(e.reps) + '</span><span class="pill__lbl">reps</span></button>';
    }

    var weightCtrl = e.type === "strength"
      ? '<div class="weight" role="group" aria-label="Working weight">' +
          '<button type="button" class="step" data-act="w-" data-ex="' + e.id + '" aria-label="Decrease weight by ' + STEP + '">−</button>' +
          '<span class="weight__field"><input class="weight__input mono" type="number" inputmode="decimal" step="' + STEP + '" min="0" value="' + e.weight + '" data-act="wset" data-ex="' + e.id + '" aria-label="Working weight in ' + esc(state.unit) + '"><span class="weight__unit">' + esc(state.unit) + '</span></span>' +
          '<button type="button" class="step" data-act="w+" data-ex="' + e.id + '" aria-label="Increase weight by ' + STEP + '">+</button>' +
        '</div>'
      : '<span class="weight-note">Bodyweight · move with control</span>';

    return '<article class="card' + (complete ? " is-complete" : "") + '" data-ex="' + e.id + '" style="--i:' + i + '">' +
      '<header class="card__head"><h3 class="card__name">' + esc(e.name) + '</h3>' +
      '<span class="tag tag--' + e.type + '">' + e.type + '</span></header>' +
      '<div class="card__row">' + weightCtrl +
        '<div class="setcount"><span class="setcount__done">' + doneCount + '</span><span class="setcount__sep">/</span><span class="setcount__total">' + total + '</span><span class="setcount__label">sets</span></div>' +
      '</div>' +
      '<div class="pills" role="group" aria-label="Sets — tap to log">' + pills + '</div>' +
      '<button type="button" class="notes-toggle" data-act="notes" data-ex="' + e.id + '" aria-expanded="' + (e.notesOpen ? "true" : "false") + '" aria-controls="n-' + e.id + '">' +
        '<span class="chev" aria-hidden="true">▸</span> Form notes' + (e.notes && e.notes.trim() ? ' <span class="dot" aria-hidden="true"></span>' : "") + '</button>' +
      '<div class="notes' + (e.notesOpen ? " is-open" : "") + '" id="n-' + e.id + '"><div class="notes__inner"><div class="notes__pad">' +
        '<label class="field-label" for="cue-' + e.id + '">Form cues</label>' +
        '<textarea class="notes__text" id="cue-' + e.id + '" data-act="note" data-ex="' + e.id + '" placeholder="Cue yourself — brace, tempo, range of motion…">' + esc(e.notes || "") + '</textarea>' +
        '<div class="scheme">' +
          '<div class="scheme__item"><span class="field-label">Sets</span><div class="stepper">' +
            '<button type="button" class="step" data-act="sets-" data-ex="' + e.id + '" aria-label="One fewer set">−</button>' +
            '<span class="stepper__val">' + total + '</span>' +
            '<button type="button" class="step" data-act="sets+" data-ex="' + e.id + '" aria-label="One more set">+</button></div></div>' +
          '<div class="scheme__item"><label class="field-label" for="reps-' + e.id + '">Reps target</label>' +
            '<input class="reps__input mono" id="reps-' + e.id + '" type="text" value="' + esc(e.reps) + '" data-act="reps" data-ex="' + e.id + '" aria-label="Reps target"></div>' +
        '</div>' +
      '</div></div></div></article>';
  }

  // ---------- render: list ----------
  function renderList(animate) {
    var ex = curSession().exercises;
    listEl.classList.toggle("reveal", !!animate);
    listEl.innerHTML = ex.map(buildCard).join("");
  }

  function renderAll(animate) {
    renderTabs(); renderHead(); renderList(animate);
  }

  // ---------- interactions ----------
  function replaceCard(id) {
    var ex = curSession().exercises, idx = -1;
    for (var i = 0; i < ex.length; i++) if (ex[i].id === id) { idx = i; break; }
    if (idx < 0) return;
    listEl.classList.remove("reveal");
    var old = listEl.querySelector('.card[data-ex="' + id + '"]');
    if (old) old.outerHTML = buildCard(ex[idx], idx);
  }

  function onListClick(ev) {
    var btn = ev.target.closest("[data-act]");
    if (!btn) return;
    var act = btn.getAttribute("data-act"), id = btn.getAttribute("data-ex"), e = findEx(id);
    if (!e) return;

    if (act === "set") {
      var si = parseInt(btn.getAttribute("data-set"), 10);
      e.done[si] = !e.done[si]; save();
      var on = e.done[si];
      btn.classList.toggle("is-done", on);
      btn.setAttribute("aria-pressed", on);
      btn.setAttribute("aria-label", "Set " + (si + 1) + " of " + e.sets + (on ? ", done" : ""));
      btn.classList.remove("pulse"); void btn.offsetWidth; btn.classList.add("pulse");
      var card = btn.closest(".card"), dc = e.done.slice(0, e.sets).filter(Boolean).length;
      card.querySelector(".setcount__done").textContent = dc;
      card.classList.toggle("is-complete", e.sets > 0 && dc === e.sets);
    } else if (act === "w-" || act === "w+") {
      e.weight = roundW(Math.max(0, e.weight + (act === "w+" ? STEP : -STEP))); save();
      btn.closest(".card").querySelector(".weight__input").value = e.weight;
    } else if (act === "notes") {
      e.notesOpen = !e.notesOpen; save();
      btn.setAttribute("aria-expanded", e.notesOpen ? "true" : "false");
      btn.closest(".card").querySelector(".notes").classList.toggle("is-open", e.notesOpen);
    } else if (act === "sets-" || act === "sets+") {
      var ns = clampInt(e.sets + (act === "sets+" ? 1 : -1), SETS_MIN, SETS_MAX, e.sets);
      if (ns === e.sets) return;
      if (ns > e.sets) { while (e.done.length < ns) e.done.push(false); }
      else e.done = e.done.slice(0, ns);
      e.sets = ns; save(); replaceCard(id);
    }
  }

  function onListInput(ev) {
    var el = ev.target, act = el.getAttribute("data-act");
    if (!act) return;
    var e = findEx(el.getAttribute("data-ex")); if (!e) return;
    if (act === "wset") { e.weight = roundW(Math.max(0, numOr(el.value, 0))); save(); }
    else if (act === "note") {
      e.notes = el.value; save();
      var tog = listEl.querySelector('.notes-toggle[data-ex="' + e.id + '"]');
      var dot = tog.querySelector(".dot");
      if (e.notes.trim() && !dot) tog.insertAdjacentHTML("beforeend", ' <span class="dot" aria-hidden="true"></span>');
      else if (!e.notes.trim() && dot) dot.remove();
    } else if (act === "reps") {
      e.reps = el.value; save();
      var card = el.closest(".card");
      card.querySelectorAll(".pill__reps").forEach(function (r) { r.textContent = e.reps; });
    }
  }

  function resetDay() {
    var s = curSession();
    if (!confirm("Reset all sets for Session " + state.activeSession + "?")) return;
    s.exercises.forEach(function (e) { e.done = e.done.map(function () { return false; }); });
    state.lastReset[state.activeSession] = new Date().toISOString();
    save(); renderHead(); renderList(true);
    toast("Session " + state.activeSession + " reset");
  }

  function switchSession(k) {
    if (k === state.activeSession) return;
    state.activeSession = k; save(); renderAll(true);
  }

  // tab clicks + keyboard
  tabsEl.addEventListener("click", function (ev) {
    var t = ev.target.closest(".tab"); if (t) switchSession(t.getAttribute("data-tab"));
  });
  tabsEl.addEventListener("keydown", function (ev) {
    if (ev.key !== "ArrowRight" && ev.key !== "ArrowLeft") return;
    var order = ["A", "B", "C"], i = order.indexOf(state.activeSession);
    var ni = ev.key === "ArrowRight" ? (i + 1) % 3 : (i + 2) % 3;
    switchSession(order[ni]);
    var nt = tabsEl.querySelector('.tab[data-tab="' + order[ni] + '"]'); if (nt) nt.focus();
  });

  listEl.addEventListener("click", onListClick);
  listEl.addEventListener("input", onListInput);

  // ---------- theme ----------
  function applyTheme() {
    if (state.theme === "system") document.documentElement.removeAttribute("data-theme");
    else document.documentElement.setAttribute("data-theme", state.theme);
    syncSegs();
  }

  // ---------- settings sheet ----------
  function openSheet() { syncSegs(); refreshStorage(); if (typeof sheet.showModal === "function") sheet.showModal(); else sheet.setAttribute("open", ""); }
  function closeSheet() { if (typeof sheet.close === "function") sheet.close(); else sheet.removeAttribute("open"); }

  function syncSegs() {
    document.querySelectorAll("#themeSeg button").forEach(function (b) {
      b.setAttribute("aria-pressed", b.getAttribute("data-theme-val") === state.theme);
    });
    document.querySelectorAll("#unitSeg button").forEach(function (b) {
      b.setAttribute("aria-pressed", b.getAttribute("data-unit-val") === state.unit);
    });
  }

  $("settingsBtn").addEventListener("click", openSheet);
  $("closeSheet").addEventListener("click", closeSheet);
  sheet.addEventListener("click", function (ev) { if (ev.target === sheet) closeSheet(); });

  $("themeSeg").addEventListener("click", function (ev) {
    var b = ev.target.closest("[data-theme-val]"); if (!b) return;
    state.theme = b.getAttribute("data-theme-val"); save(); applyTheme();
  });
  $("unitSeg").addEventListener("click", function (ev) {
    var b = ev.target.closest("[data-unit-val]"); if (!b) return;
    state.unit = b.getAttribute("data-unit-val"); save(); syncSegs(); renderList(false);
  });

  // ---------- backup ----------
  function exportBackup() {
    var data = JSON.stringify(state, null, 2);
    var blob = new Blob([data], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "training-log-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    toast("Backup downloaded");
  }
  function importBackup(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var parsed = JSON.parse(reader.result);
        if (!parsed || !parsed.sessions) throw new Error("bad");
        if (!confirm("Replace all current data with this backup? This can't be undone.")) return;
        state = migrate(parsed); save(); applyTheme(); renderAll(true); syncSegs();
        closeSheet(); toast("Backup restored");
      } catch (e) { toast("That file isn't a valid backup"); }
    };
    reader.onerror = function () { toast("Couldn't read that file"); };
    reader.readAsText(file);
  }
  $("exportBtn").addEventListener("click", exportBackup);
  $("importBtn").addEventListener("click", function () { $("importFile").click(); });
  $("importFile").addEventListener("change", function (ev) {
    if (ev.target.files && ev.target.files[0]) importBackup(ev.target.files[0]);
    ev.target.value = "";
  });
  $("eraseBtn").addEventListener("click", function () {
    if (!confirm("Erase ALL data and restore the starter sessions? This can't be undone.")) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    state = seed(); save(); applyTheme(); renderAll(true); syncSegs(); closeSheet();
    toast("All data erased");
  });

  // ---------- storage persistence ----------
  function refreshStorage() {
    var el = $("storageStatus"), dot = el.querySelector(".status__dot"), txt = el.querySelector("span:last-child");
    if (!(navigator.storage && navigator.storage.persisted)) { dot.className = "status__dot"; txt.textContent = "Saved on this device"; return; }
    navigator.storage.persisted().then(function (p) {
      dot.className = "status__dot" + (p ? " ok" : "");
      txt.textContent = p ? "Persistent — won't be auto-cleared" : "Best-effort (may clear under storage pressure)";
    });
  }
  function initPersistence() {
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persisted().then(function (p) {
        if (!p) return navigator.storage.persist();
      }).catch(function () {});
    }
  }

  // ---------- toast ----------
  var toastTimer;
  function toast(msg) {
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastTimer); toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 2200);
  }

  // ---------- boot ----------
  applyTheme();
  renderAll(true);
  initPersistence();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
